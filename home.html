<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>TS Live Stream</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#6d28d9" />
<link rel="icon" href="/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="/icon.svg" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="TS Live Stream" />
<style>
  :root {
    --bg: #eceaf4;
    --card: #ffffff;
    --border: #e9e4f5;
    --text: #2b2540;
    --muted: #8b86a3;
    --accent: #7c3aed;
    --accent-2: #9d5cf5;
    --grad: linear-gradient(135deg, #9d5cf5 0%, #6d28d9 100%);
    --side: #2c0e63;
    --side-2: #3a1580;
    --danger: #ef4444;
    --shadow: 0 10px 30px rgba(109,40,217,.12);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text);
  }
  button { font-family: inherit; cursor: pointer; border: none; }
  .hidden { display: none !important; }

  /* ---- Auth ---- */
  .auth-wrap {
    position: relative; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px; overflow: hidden; background: #160a2b;
  }
  /* Fond flou multicolore facon "bokeh" */
  .auth-wrap::before {
    content: ""; position: absolute; inset: -25%; z-index: 0; pointer-events: none;
    background:
      radial-gradient(circle at 22% 28%, #8b5cf6 0%, transparent 42%),
      radial-gradient(circle at 80% 18%, #4f46e5 0%, transparent 45%),
      radial-gradient(circle at 72% 78%, #ec4899 0%, transparent 42%),
      radial-gradient(circle at 26% 82%, #f59e0b 0%, transparent 38%),
      radial-gradient(circle at 50% 55%, #6d28d9 0%, transparent 55%);
    filter: blur(90px); opacity: .85;
  }
  .auth-card {
    position: relative; z-index: 1; background: transparent; box-shadow: none;
    width: 100%; max-width: 380px; text-align: center;
  }
  .auth-logo { display: flex; flex-direction: column; align-items: center; gap: 14px; margin-bottom: 26px; }
  .auth-logo svg { width: 84px; height: 84px; filter: drop-shadow(0 10px 24px rgba(0,0,0,.35)); }
  .auth-logo .name { font-size: 30px; font-weight: 900; letter-spacing: .5px; color: #fff; }
  .auth-logo .name .live { color: #ff6a8a; }
  .auth-card h2 { margin: 0 0 4px; font-size: 19px; text-align: center; color: #fff; font-weight: 700; }
  .auth-card p.sub { margin: 0 0 24px; color: rgba(255,255,255,.72); font-size: 14px; text-align: center; }
  /* Styles d'inputs globaux (utilises dans l'app : modales, chat) */
  label { display: block; font-size: 13px; color: var(--muted); margin: 0 0 6px; font-weight: 600; }
  input, .composer textarea {
    width: 100%; padding: 12px 14px; background: #f5f3fc; border: 1.5px solid var(--border);
    border-radius: 12px; color: var(--text); font-size: 15px; margin-bottom: 14px; outline: none;
  }
  input:focus { border-color: var(--accent); background: #fff; }
  /* Surcharge "Rave" pour l'ecran de connexion */
  .auth-card label { display: none; }
  .auth-card input {
    padding: 14px 18px; margin-bottom: 12px;
    background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.22);
    border-radius: 999px; color: #fff; text-align: center;
    -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
  }
  .auth-card input::placeholder { color: rgba(255,255,255,.6); }
  .auth-card input:focus { border-color: #fff; background: rgba(255,255,255,.18); }
  .btn { border-radius: 12px; padding: 12px 16px; font-size: 14px; font-weight: 700; transition: transform .12s, box-shadow .15s, background .15s; }
  .btn-primary { background: var(--grad); color: #fff; box-shadow: 0 6px 16px rgba(124,58,237,.45); }
  .btn-primary:hover { transform: translateY(-1px); }
  .btn-block { width: 100%; }
  .auth-card .btn-primary { border-radius: 999px; padding: 14px; }
  .btn-ghost { background: #f3f0fb; color: var(--accent); }
  .auth-switch { text-align: center; margin-top: 16px; font-size: 14px; color: rgba(255,255,255,.72); }
  .auth-switch a { color: #fff; cursor: pointer; font-weight: 700; text-decoration: underline; }
  .auth-err { background: rgba(255,80,80,.18); color: #ffd9d9; border: 1px solid rgba(255,80,80,.3); border-radius: 12px; padding: 10px 12px; font-size: 13px; margin-bottom: 14px; }

  /* ---- App shell (verre depoli sur fond flou multicolore) ---- */
  .shell { display: grid; grid-template-columns: 270px 1fr; height: 100vh; position: relative; background: #160a2b; }
  .shell::before {
    content: ""; position: fixed; inset: -25%; z-index: 0; pointer-events: none;
    background:
      radial-gradient(circle at 22% 28%, #8b5cf6 0%, transparent 42%),
      radial-gradient(circle at 80% 18%, #4f46e5 0%, transparent 45%),
      radial-gradient(circle at 72% 78%, #ec4899 0%, transparent 42%),
      radial-gradient(circle at 26% 82%, #f59e0b 0%, transparent 38%),
      radial-gradient(circle at 50% 55%, #6d28d9 0%, transparent 55%);
    filter: blur(90px); opacity: .8;
  }
  .shell > * { position: relative; z-index: 1; }
  .sidebar { background: rgba(18,9,38,.45); -webkit-backdrop-filter: blur(18px); backdrop-filter: blur(18px); border-right: 1px solid rgba(255,255,255,.1); color: #fff; display: flex; flex-direction: column; padding: 16px 14px; }
  .side-brand { display: flex; align-items: center; gap: 10px; padding: 6px 6px 16px; }
  .side-brand .name { font-weight: 800; letter-spacing: .4px; }
  .side-brand .name .live { color: #ff5470; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 12px; border-radius: 12px; color: rgba(255,255,255,.85);
    font-weight: 600; font-size: 14px; cursor: pointer; }
  .nav-item:hover { background: rgba(255,255,255,.08); }
  .nav-item.active { background: rgba(255,255,255,.16); color: #fff; }
  .side-section { margin-top: 18px; display: flex; align-items: center; justify-content: space-between; padding: 0 8px 6px;
    font-size: 11px; letter-spacing: 1px; color: rgba(255,255,255,.5); font-weight: 700; }
  .side-section button { background: rgba(255,255,255,.14); color: #fff; border-radius: 8px; width: 24px; height: 24px; font-size: 16px; line-height: 1; }
  .groups { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
  .group-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 10px; cursor: pointer; font-size: 14px; color: rgba(255,255,255,.85); }
  .group-item:hover { background: rgba(255,255,255,.08); }
  .group-item.active { background: rgba(255,255,255,.18); color: #fff; }
  .group-ava { width: 30px; height: 30px; border-radius: 9px; background: var(--grad); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; flex: none; }
  .side-user { border-top: 1px solid rgba(255,255,255,.12); padding-top: 12px; margin-top: 8px; display: flex; align-items: center; gap: 10px; font-size: 14px; }
  .side-user .uava { width: 32px; height: 32px; border-radius: 50%; background: #ff5470; display: flex; align-items: center; justify-content: center; font-weight: 800; }
  .side-user .uname { flex: 1; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .side-user button { background: transparent; color: rgba(255,255,255,.7); font-size: 18px; }

  .main { position: relative; overflow: hidden; background: transparent; }
  .pane { position: absolute; inset: 0; display: flex; flex-direction: column; }
  iframe.stream { width: 100%; height: 100%; border: 0; }

  /* ---- Discussion (verre depoli) ---- */
  .chat-top { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,.1); background: rgba(18,9,38,.4); -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px); color: #fff; display: flex; align-items: center; gap: 12px; }
  .chat-top .gava { width: 38px; height: 38px; border-radius: 11px; background: var(--grad); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; }
  .chat-top .gname { font-weight: 800; font-size: 16px; }
  .chat-top .gmeta { font-size: 12px; color: rgba(255,255,255,.6); }
  .chat-top .spacer { flex: 1; }
  .chat-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: transparent; }
  .empty-state { margin: auto; text-align: center; color: rgba(255,255,255,.6); max-width: 360px; }
  .empty-state .big { font-size: 40px; }
  .msg { max-width: 72%; }
  .msg .who { font-size: 11px; color: rgba(255,255,255,.55); margin: 0 0 3px 4px; }
  .msg .bubble { background: rgba(255,255,255,.14); border: none; color: #fff; padding: 10px 13px; border-radius: 14px; font-size: 14px; line-height: 1.4; word-break: break-word; -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); }
  .msg.me { align-self: flex-end; }
  .msg.me .who { text-align: right; margin: 0 4px 3px 0; }
  .msg.me .bubble { background: var(--grad); color: #fff; border: none; }
  .composer { padding: 14px 16px; border-top: 1px solid rgba(255,255,255,.1); background: rgba(18,9,38,.4); -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px); display: flex; gap: 10px; align-items: center; }
  .composer input { margin: 0; border-radius: 999px; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.22); color: #fff; }
  .composer input::placeholder { color: rgba(255,255,255,.55); }
  .composer .icon-btn { background: rgba(255,255,255,.14); color: #fff; width: 44px; height: 44px; border-radius: 50%; font-size: 18px; flex: none; }
  .composer .icon-btn:disabled { opacity: .45; cursor: not-allowed; }
  .composer .send { background: var(--grad); color: #fff; width: 44px; height: 44px; border-radius: 50%; font-size: 18px; flex: none; }
  .composer .icon-btn.recording { background: #ef4444; color: #fff; animation: livepulse 1.2s ease-in-out infinite; }
  .chat-img { max-width: 240px; max-height: 260px; border-radius: 10px; display: block; }
  .chat-audio { width: 232px; height: 40px; }
  .chat-file { color: #fff; text-decoration: underline; word-break: break-all; }
  .msg .bubble.media { padding: 6px; background: rgba(255,255,255,.1); }
  .msg.me .bubble.media { background: rgba(124,58,237,.4); }

  /* ---- Modal ---- */
  .modal-bg { position: fixed; inset: 0; background: rgba(20,10,40,.5); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
  .modal { background: #fff; border-radius: 18px; padding: 24px; width: 100%; max-width: 400px; box-shadow: var(--shadow); }
  .modal h3 { margin: 0 0 16px; font-size: 18px; }
  .modal .row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .member-list { max-height: 180px; overflow-y: auto; margin-top: 6px; }
  .member-list .m { padding: 8px 4px; font-size: 14px; border-bottom: 1px solid var(--border); }
  .note { font-size: 12px; color: var(--muted); margin: 0 0 14px; }
  .menu-toggle { display: none; }
  .mobile-menu { display: none; }
  .sidebar-backdrop { display: none; }
  @media (max-width: 760px) {
    .shell { grid-template-columns: 1fr; }
    .sidebar {
      position: fixed; top: 0; left: 0; z-index: 60; width: 80%; max-width: 300px; height: 100%;
      transform: translateX(-100%); transition: transform .25s ease; box-shadow: 0 0 40px rgba(0,0,0,.5);
    }
    .sidebar.open { transform: none; }
    .sidebar-backdrop.show { display: block; position: fixed; inset: 0; z-index: 55; background: rgba(0,0,0,.5); }
    .mobile-menu {
      display: flex; align-items: center; justify-content: center;
      position: fixed; top: 12px; left: 12px; z-index: 50; cursor: pointer;
      width: 42px; height: 42px; border-radius: 12px;
      background: rgba(18,9,38,.65); -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
      color: #fff; font-size: 20px; border: 1px solid rgba(255,255,255,.22);
    }
    .chat-top { padding-left: 66px; }
    .chat-top .gname { font-size: 15px; }
    .chat-top #add-member-btn { font-size: 13px; padding: 8px 10px; }
  }
</style>
</head>
<body>

<!-- ============ AUTH ============ -->
<div class="auth-wrap" id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="44" height="44" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="al" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#9d5cf5"/><stop offset="1" stop-color="#6d28d9"/></linearGradient></defs>
        <rect x="3" y="3" width="58" height="58" rx="17" fill="url(#al)"/>
        <text x="29" y="45" text-anchor="middle" font-family="Arial" font-weight="900" font-size="33" fill="#fff">TS</text>
        <g fill="none" stroke="#ff5470" stroke-width="3" stroke-linecap="round"><path d="M43 23 a9 9 0 0 1 9 9"/><path d="M43 16 a16 16 0 0 1 16 16"/></g>
        <circle cx="44" cy="32" r="3.4" fill="#ff5470"/>
      </svg>
      <span class="name">TS <span class="live">Live</span> Stream</span>
    </div>
    <h2 id="auth-title">Connexion</h2>
    <p class="sub" id="auth-sub">Connecte-toi avec ton pseudo et ton mot de passe.</p>
    <div class="auth-err hidden" id="auth-err"></div>
    <label for="au-username">Nom d'utilisateur</label>
    <input id="au-username" placeholder="ex : Martin" maxlength="40" autocomplete="username" />
    <label for="au-pass">Mot de passe</label>
    <input id="au-pass" type="password" placeholder="••••••••" autocomplete="current-password" />
    <button class="btn btn-primary btn-block" id="auth-submit">Se connecter</button>
    <div class="auth-switch" id="auth-switch">Pas de compte ? <a id="auth-toggle">Créer un compte</a></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div class="shell hidden" id="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="side-brand">
      <svg width="34" height="34" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="3" width="58" height="58" rx="17" fill="#fff"/>
        <text x="29" y="45" text-anchor="middle" font-family="Arial" font-weight="900" font-size="33" fill="#6d28d9">TS</text>
        <g fill="none" stroke="#ff5470" stroke-width="3" stroke-linecap="round"><path d="M43 23 a9 9 0 0 1 9 9"/><path d="M43 16 a16 16 0 0 1 16 16"/></g>
        <circle cx="44" cy="32" r="3.4" fill="#ff5470"/>
      </svg>
      <span class="name">TS <span class="live">Live</span> Stream</span>
    </div>

    <div class="nav-item active" id="nav-stream"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:10px;flex:none"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Salon Streaming</div>

    <div class="nav-item" id="nav-build-maestro"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:10px;flex:none"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>Build FC 26</div>

    <div class="nav-item" id="nav-cal"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:10px;flex:none"><rect x="3" y="4.5" width="18" height="17" rx="2"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></svg>CDM 26</div>

    <div class="side-section">DISCUSSIONS <button id="new-group-btn" title="Nouveau groupe">+</button></div>
    <div class="groups" id="groups-list"></div>

    <div class="side-user">
      <span class="uava" id="user-ava">?</span>
      <span class="uname" id="user-name">…</span>
      <button id="logout-btn" title="Se déconnecter">⎋</button>
    </div>
  </aside>

  <button class="mobile-menu" id="mobile-menu" aria-label="Ouvrir le menu">☰</button>
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

  <main class="main">
    <!-- Streaming -->
    <section class="pane" id="pane-stream">
      <iframe class="stream" id="stream-frame" allow="display-capture; microphone; camera; fullscreen; autoplay; clipboard-write" src="about:blank"></iframe>
    </section>

    <!-- Build FC -->
    <section class="pane hidden" id="pane-build">
      <iframe class="stream" id="build-frame" src="about:blank"></iframe>
    </section>

    <!-- Calendrier Coupe du Monde -->
    <section class="pane hidden" id="pane-cal">
      <iframe class="stream" id="cal-frame" src="about:blank"></iframe>
    </section>

    <!-- Discussion -->
    <section class="pane hidden" id="pane-chat">
      <div class="chat-top">
        <button class="menu-toggle" id="menu-toggle">☰</button>
        <span class="gava" id="chat-ava">#</span>
        <div>
          <div class="gname" id="chat-name">Discussion</div>
          <div class="gmeta" id="chat-meta"></div>
        </div>
        <span class="spacer"></span>
        <button class="btn btn-ghost" id="add-member-btn">+ Ajouter un membre</button>
      </div>
      <div class="chat-body" id="chat-body"></div>
      <div class="composer">
        <input type="file" id="file-input" accept="image/*,application/pdf,.doc,.docx,.txt,.zip,.mp3,.mp4" hidden />
        <button class="icon-btn" id="attach-btn" title="Envoyer une photo, un fichier ou un PDF">📎</button>
        <button class="icon-btn" id="voice-btn" title="Message vocal (cliquer pour démarrer / arrêter)">🎤</button>
        <input id="msg-input" placeholder="Écrire un message…" autocomplete="off" maxlength="2000" />
        <button class="send" id="send-btn" title="Envoyer">➤</button>
      </div>
    </section>
  </main>
</div>

<div id="modal-root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function () {
  "use strict";
  const SUPABASE_URL = "https://pukzfqdfkvojwznxqqme.supabase.co";
  const SUPABASE_KEY = "sb_publishable_odYYSKUKEWJrCf5bub_Spg_jwEJr-yP";
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // PWA : enregistre le service worker (rend l'app installable)
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    });
  }

  const $ = (id) => document.getElementById(id);
  // Auth refs
  const authScreen = $("auth-screen"), appShell = $("app-shell");
  const authTitle = $("auth-title"), authSub = $("auth-sub"), authErr = $("auth-err");
  const auUsername = $("au-username"), auPass = $("au-pass"), authSubmit = $("auth-submit"),
        authToggle = $("auth-toggle"), authSwitch = $("auth-switch");
  // Shell refs
  const navStream = $("nav-stream"), groupsList = $("groups-list"), newGroupBtn = $("new-group-btn");
  const userAva = $("user-ava"), userName = $("user-name"), logoutBtn = $("logout-btn");
  const paneStream = $("pane-stream"), paneChat = $("pane-chat"), streamFrame = $("stream-frame");
  const navBuildMaestro = $("nav-build-maestro"), paneBuild = $("pane-build"), buildFrame = $("build-frame");
  const navCal = $("nav-cal"), paneCal = $("pane-cal"), calFrame = $("cal-frame");
  const chatAva = $("chat-ava"), chatName = $("chat-name"), chatMeta = $("chat-meta"),
        chatBody = $("chat-body"), msgInput = $("msg-input"), sendBtn = $("send-btn"),
        addMemberBtn = $("add-member-btn"), sidebar = $("sidebar"), menuToggle = $("menu-toggle");
  const modalRoot = $("modal-root");

  let me = null;                 // { id, email, username }
  let isSignup = false;
  let groups = [];               // [{id,name}]
  let currentGroup = null;       // {id,name}
  let channel = null;            // realtime channel
  const profileCache = {};       // userId -> username

  // ---------- AUTH UI ----------
  function showErr(msg) { authErr.textContent = msg; authErr.classList.remove("hidden"); }
  function clearErr() { authErr.classList.add("hidden"); }
  authToggle.addEventListener("click", () => {
    isSignup = !isSignup; clearErr();
    authTitle.textContent = isSignup ? "Créer un compte" : "Connexion";
    authSub.textContent = isSignup ? "Choisis un pseudo et un mot de passe." : "Connecte-toi avec ton pseudo et ton mot de passe.";
    authSubmit.textContent = isSignup ? "Créer mon compte" : "Se connecter";
    authSwitch.innerHTML = isSignup ? "Déjà un compte ? <a id='auth-toggle'>Se connecter</a>" : "Pas de compte ? <a id='auth-toggle'>Créer un compte</a>";
    $("auth-toggle").addEventListener("click", () => authToggle.click());
  });

  authSubmit.addEventListener("click", doAuth);
  auPass.addEventListener("keydown", (e) => { if (e.key === "Enter") doAuth(); });

  // Transforme un pseudo en email interne (identique au serveur). Aucun email n'est envoyé.
  function emailFor(username) {
    const clean = String(username || "").trim().toLowerCase().replace(/[^a-z0-9_.-]/g, "");
    return clean ? clean + "@tslive.app" : "";
  }

  async function doAuth() {
    clearErr();
    const username = auUsername.value.trim(), pass = auPass.value;
    const email = emailFor(username);
    if (!email) { showErr("Choisis un pseudo (lettres, chiffres, . _ -)."); return; }
    if (!pass) { showErr("Mot de passe requis."); return; }
    authSubmit.disabled = true; authSubmit.textContent = "…";
    try {
      if (isSignup) {
        const resp = await fetch("/api/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password: pass })
        });
        const out = await resp.json().catch(() => ({}));
        if (!resp.ok) { showErr(out.error || "Inscription impossible."); resetSubmit(); return; }
      }
      const { error } = await sb.auth.signInWithPassword({ email, password: pass });
      if (error) throw error;
      await onLoggedIn();
    } catch (e) {
      showErr(e.message || "Erreur d'authentification.");
      resetSubmit();
    }
  }
  function resetSubmit() { authSubmit.disabled = false; authSubmit.textContent = isSignup ? "Créer mon compte" : "Se connecter"; }

  async function ensureProfile(username) {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return;
    await sb.from("profiles").upsert({ id: user.id, username }, { onConflict: "id" });
  }

  // ---------- SESSION ----------
  async function onLoggedIn() {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return;
    let username = user.user_metadata && user.user_metadata.username;
    // récupère ou crée le profil
    const { data: prof } = await sb.from("profiles").select("username").eq("id", user.id).maybeSingle();
    if (prof && prof.username) username = prof.username;
    else { username = username || user.email.split("@")[0]; await sb.from("profiles").upsert({ id: user.id, username }, { onConflict: "id" }); }
    me = { id: user.id, email: user.email, username };
    profileCache[me.id] = username;
    authScreen.classList.add("hidden");
    appShell.classList.remove("hidden");
    userName.textContent = username;
    userAva.textContent = (username[0] || "?").toUpperCase();
    openStream();
    await loadGroups();
  }

  logoutBtn.addEventListener("click", async () => { await sb.auth.signOut(); location.reload(); });

  // ---------- STREAMING ----------
  function deactivateNav() {
    navStream.classList.remove("active");
    navBuildMaestro.classList.remove("active");
    navCal.classList.remove("active");
    [...groupsList.querySelectorAll(".group-item")].forEach(el => el.classList.remove("active"));
  }
  function hideAllPanes() {
    paneStream.classList.add("hidden"); paneBuild.classList.add("hidden");
    paneCal.classList.add("hidden"); paneChat.classList.add("hidden");
  }

  function openStream() {
    deactivateNav(); navStream.classList.add("active");
    hideAllPanes(); paneStream.classList.remove("hidden");
    if (streamFrame.src === "about:blank" || !streamFrame.src.endsWith("/index.html")) {
      streamFrame.src = "/index.html";
    }
    closeSidebarMobile();
  }
  navStream.addEventListener("click", openStream);

  // ---------- BUILD FC ----------
  function openBuild() {
    deactivateNav(); navBuildMaestro.classList.add("active");
    hideAllPanes(); paneBuild.classList.remove("hidden");
    if (buildFrame.src === "about:blank" || !buildFrame.src.endsWith("/fc26-builds.html")) {
      buildFrame.src = "/fc26-builds.html";
    }
    closeSidebarMobile();
  }
  navBuildMaestro.addEventListener("click", openBuild);

  // ---------- CALENDRIER COUPE DU MONDE ----------
  function openCal() {
    deactivateNav(); navCal.classList.add("active");
    hideAllPanes(); paneCal.classList.remove("hidden");
    if (!calFrame.src.includes("/wc2026.html")) {
      calFrame.src = "/wc2026.html?v=9";
    }
    closeSidebarMobile();
  }
  navCal.addEventListener("click", openCal);

  // ---------- GROUPES ----------
  async function loadGroups() {
    const { data, error } = await sb.from("groups").select("id,name").order("created_at");
    if (error) { console.error(error); return; }
    groups = data || [];
    renderGroups();
  }
  function renderGroups() {
    groupsList.innerHTML = "";
    groups.forEach(g => {
      const el = document.createElement("div");
      el.className = "group-item" + (currentGroup && currentGroup.id === g.id ? " active" : "");
      el.innerHTML = `<span class="group-ava">${escapeHtml((g.name[0]||'#').toUpperCase())}</span><span>${escapeHtml(g.name)}</span>`;
      el.addEventListener("click", () => openGroup(g));
      groupsList.appendChild(el);
    });
  }

  newGroupBtn.addEventListener("click", openNewGroupModal);

  function openNewGroupModal() {
    showModal(`
      <h3>Nouveau groupe</h3>
      <label>Nom du groupe</label>
      <input id="ng-name" placeholder="ex : Les potes" maxlength="60" />
      <div class="row">
        <button class="btn btn-ghost" data-close>Annuler</button>
        <button class="btn btn-primary" id="ng-create">Créer</button>
      </div>
    `);
    const nameI = $("ng-name"); nameI.focus();
    $("ng-create").addEventListener("click", async () => {
      const name = nameI.value.trim();
      if (!name) { nameI.focus(); return; }
      $("ng-create").disabled = true;
      const { data: g, error } = await sb.from("groups").insert({ name, created_by: me.id }).select("id,name").single();
      if (error) { alert("Erreur : " + error.message); return; }
      await sb.from("group_members").insert({ group_id: g.id, user_id: me.id });
      closeModal();
      await loadGroups();
      openGroup(g);
    });
  }

  async function openGroup(g) {
    currentGroup = g;
    deactivateNav();
    renderGroups();
    hideAllPanes(); paneChat.classList.remove("hidden");
    chatName.textContent = g.name;
    chatAva.textContent = (g.name[0] || "#").toUpperCase();
    chatBody.innerHTML = "";
    closeSidebarMobile();
    await loadMembersMeta(g.id);
    await loadMessages(g.id);
    subscribeRealtime(g.id);
    msgInput.focus();
  }

  async function loadMembersMeta(gid) {
    const { data } = await sb.from("group_members").select("user_id").eq("group_id", gid);
    const ids = (data || []).map(m => m.user_id);
    chatMeta.textContent = ids.length + " membre" + (ids.length > 1 ? "s" : "");
    await cacheProfiles(ids);
  }

  async function cacheProfiles(ids) {
    const missing = ids.filter(id => !profileCache[id]);
    if (!missing.length) return;
    const { data } = await sb.from("profiles").select("id,username").in("id", missing);
    (data || []).forEach(p => profileCache[p.id] = p.username);
  }

  async function loadMessages(gid) {
    const { data, error } = await sb.from("messages").select("*").eq("group_id", gid).order("created_at");
    if (error) { console.error(error); return; }
    await cacheProfiles([...new Set((data || []).map(m => m.sender))]);
    chatBody.innerHTML = "";
    if (!data || !data.length) {
      chatBody.innerHTML = `<div class="empty-state"><div class="big">💬</div><p>Aucun message pour l'instant.<br/>Lance la discussion !</p></div>`;
      return;
    }
    data.forEach(addMessage);
    scrollBottom();
  }

  function subscribeRealtime(gid) {
    if (channel) { sb.removeChannel(channel); channel = null; }
    channel = sb.channel("grp:" + gid)
      .on("postgres_changes", { event: "INSERT", schema: "public", table: "messages", filter: "group_id=eq." + gid },
        async (payload) => {
          const m = payload.new;
          if (m.sender && !profileCache[m.sender]) await cacheProfiles([m.sender]);
          const es = chatBody.querySelector(".empty-state"); if (es) es.remove();
          addMessage(m); scrollBottom();
        })
      .subscribe();
  }

  function addMessage(m) {
    const mine = m.sender === me.id;
    const div = document.createElement("div");
    div.className = "msg" + (mine ? " me" : "");
    const who = document.createElement("div");
    who.className = "who";
    who.textContent = mine ? "Vous" : (profileCache[m.sender] || "?");
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    if (m.type === "image" && m.file_url) {
      bubble.classList.add("media");
      const a = document.createElement("a"); a.target = "_blank"; a.rel = "noopener";
      const img = document.createElement("img"); img.className = "chat-img"; img.alt = m.file_name || "image"; img.loading = "lazy";
      a.appendChild(img); bubble.appendChild(a);
      signedUrl(m.file_url).then(u => { if (u) { a.href = u; img.src = u; } });
    } else if (m.type === "audio" && m.file_url) {
      bubble.classList.add("media");
      const au = document.createElement("audio"); au.className = "chat-audio"; au.controls = true;
      bubble.appendChild(au);
      signedUrl(m.file_url).then(u => { if (u) au.src = u; });
    } else if (m.type === "file" && m.file_url) {
      const a = document.createElement("a"); a.className = "chat-file"; a.target = "_blank"; a.rel = "noopener";
      a.textContent = "📎 " + (m.file_name || "fichier");
      bubble.appendChild(a);
      signedUrl(m.file_url).then(u => { if (u) a.href = u; });
    } else {
      bubble.textContent = m.content || "";
    }
    div.appendChild(who); div.appendChild(bubble);
    chatBody.appendChild(div);
  }
  function scrollBottom() { chatBody.scrollTop = chatBody.scrollHeight; }

  // ---------- ENVOI MESSAGE ----------
  async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !currentGroup) return;
    msgInput.value = "";
    const { error } = await sb.from("messages").insert({ group_id: currentGroup.id, sender: me.id, content: text, type: "text" });
    if (error) { alert("Envoi impossible : " + error.message); msgInput.value = text; }
  }
  sendBtn.addEventListener("click", sendMessage);
  msgInput.addEventListener("keydown", (e) => { if (e.key === "Enter") sendMessage(); });

  // ---------- FICHIERS / PHOTOS / PDF + VOCAUX ----------
  const fileInput = $("file-input"), attachBtn = $("attach-btn"), voiceBtn = $("voice-btn");

  attachBtn.addEventListener("click", () => { if (currentGroup) fileInput.click(); });
  fileInput.addEventListener("change", async () => {
    const f = fileInput.files[0]; fileInput.value = "";
    if (f) await sendFile(f);
  });

  // Bucket privé : on renvoie le CHEMIN du fichier (et non une URL publique).
  // L'affichage génère une URL signée temporaire à la demande (voir signedUrl).
  async function uploadToBucket(blob, filename) {
    const ext = (String(filename).split(".").pop() || "bin").toLowerCase();
    const path = currentGroup.id + "/" + Date.now() + "_" + Math.random().toString(36).slice(2, 8) + "." + ext;
    const { error } = await sb.storage.from("chat-files").upload(path, blob, { contentType: blob.type || undefined });
    if (error) throw error;
    return path;
  }

  // Génère une URL signée (valable 1h) pour lire un fichier du bucket privé.
  // Gère aussi les anciens enregistrements qui stockaient une URL publique complète.
  async function signedUrl(ref) {
    if (!ref) return "";
    let path = String(ref);
    const marker = "/chat-files/";
    const i = path.indexOf(marker);
    if (i !== -1) path = path.slice(i + marker.length).split("?")[0];
    try { path = decodeURIComponent(path); } catch (e) {}
    const { data } = await sb.storage.from("chat-files").createSignedUrl(path, 3600);
    return (data && data.signedUrl) || "";
  }

  async function sendFile(file) {
    if (!currentGroup) return;
    if (file.size > 25 * 1024 * 1024) { alert("Fichier trop lourd (25 Mo maximum)."); return; }
    try {
      const url = await uploadToBucket(file, file.name || "fichier");
      const isImage = (file.type || "").startsWith("image/");
      const { error } = await sb.from("messages").insert({
        group_id: currentGroup.id, sender: me.id,
        type: isImage ? "image" : "file", file_url: url, file_name: file.name || "fichier", content: ""
      });
      if (error) throw error;
    } catch (e) { alert("Envoi du fichier impossible : " + (e.message || e)); }
  }

  let mediaRecorder = null, recChunks = [], recStream = null;
  voiceBtn.addEventListener("click", async () => {
    if (!currentGroup) return;
    if (mediaRecorder && mediaRecorder.state === "recording") { mediaRecorder.stop(); return; }
    try { recStream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
    catch (e) { alert("Micro indisponible ou refusé."); return; }
    recChunks = [];
    mediaRecorder = new MediaRecorder(recStream);
    mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size) recChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      try { recStream.getTracks().forEach((t) => t.stop()); } catch (e) {}
      voiceBtn.classList.remove("recording"); voiceBtn.textContent = "🎤";
      const blob = new Blob(recChunks, { type: "audio/webm" });
      if (blob.size < 800) return;
      try {
        const url = await uploadToBucket(blob, "vocal.webm");
        const { error } = await sb.from("messages").insert({
          group_id: currentGroup.id, sender: me.id, type: "audio", file_url: url, file_name: "Message vocal", content: ""
        });
        if (error) throw error;
      } catch (e) { alert("Envoi du vocal impossible : " + (e.message || e)); }
    };
    mediaRecorder.start();
    voiceBtn.classList.add("recording"); voiceBtn.textContent = "⏹";
  });

  // ---------- AJOUT DE MEMBRE ----------
  addMemberBtn.addEventListener("click", () => {
    if (!currentGroup) return;
    showModal(`
      <h3>Ajouter un membre à « ${escapeHtml(currentGroup.name)} »</h3>
      <p class="note">Entre le nom d'utilisateur exact de la personne (elle doit déjà avoir un compte).</p>
      <label>Nom d'utilisateur</label>
      <input id="am-name" placeholder="ex : Sophie" />
      <div class="row">
        <button class="btn btn-ghost" data-close>Fermer</button>
        <button class="btn btn-primary" id="am-add">Ajouter</button>
      </div>
      <div class="member-list" id="am-result"></div>
    `);
    const inp = $("am-name"); inp.focus();
    $("am-add").addEventListener("click", async () => {
      const uname = inp.value.trim();
      const res = $("am-result");
      if (!uname) return;
      const { data: prof } = await sb.from("profiles").select("id,username").ilike("username", uname).limit(1).maybeSingle();
      if (!prof) { res.innerHTML = `<div class="m">Aucun utilisateur « ${escapeHtml(uname)} » trouvé.</div>`; return; }
      const { error } = await sb.from("group_members").insert({ group_id: currentGroup.id, user_id: prof.id });
      if (error && !/duplicate/i.test(error.message)) { res.innerHTML = `<div class="m">Erreur : ${escapeHtml(error.message)}</div>`; return; }
      profileCache[prof.id] = prof.username;
      res.innerHTML = `<div class="m">✅ ${escapeHtml(prof.username)} a été ajouté.</div>`;
      inp.value = "";
      loadMembersMeta(currentGroup.id);
    });
  });

  // ---------- MODAL ----------
  function showModal(html) {
    modalRoot.innerHTML = `<div class="modal-bg"><div class="modal">${html}</div></div>`;
    modalRoot.querySelector(".modal-bg").addEventListener("click", (e) => { if (e.target.classList.contains("modal-bg")) closeModal(); });
    modalRoot.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", closeModal));
  }
  function closeModal() { modalRoot.innerHTML = ""; }

  // ---------- DIVERS ----------
  function escapeHtml(s) { return (s || "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
  const mobileMenu = $("mobile-menu"), backdrop = $("sidebar-backdrop");
  function setSidebar(open) {
    sidebar.classList.toggle("open", open);
    backdrop.classList.toggle("show", open);
  }
  menuToggle.addEventListener("click", () => setSidebar(!sidebar.classList.contains("open")));
  mobileMenu.addEventListener("click", () => setSidebar(!sidebar.classList.contains("open")));
  backdrop.addEventListener("click", () => setSidebar(false));
  function closeSidebarMobile() { setSidebar(false); }

  // ---------- DÉMARRAGE ----------
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) await onLoggedIn();
  })();
})();
</script>
</body>
</html>
